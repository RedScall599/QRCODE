# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — QR Code Generator
#
# JOBS:
#   build-and-test → runs on every push to main/develop and every PR to main
#                     - builds Docker containers
#                     - starts app + database
#                     - runs Prisma migrations
#                     - runs the test suite
#                     - tears everything down after
#
#   deploy         → runs ONLY when build-and-test passes on a push to main
#                     - SSHs into your EC2 server
#                     - clones the repo if it doesn't exist yet
#                     - pulls the latest code
#                     - rebuilds and restarts containers
#                     - runs any new Prisma migrations
#
# ─── REQUIRED GITHUB SECRETS ─────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   DATABASE_URL      Full Postgres connection string for the CI database
#   EC2_HOST          IP address of your EC2 instance  (e.g. 34.230.24.49)
#   EC2_USER          SSH username                      (e.g. ubuntu)
#   EC2_SSH_KEY           Full contents of your .pem file  (the private key text)
#   EC2_PROJECT_PATH  Absolute path to the project on the server
#                     (e.g. /home/ubuntu/QRCODE)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop]   # run on pushes to main OR develop
  pull_request:
    branches: [main]            # run on PRs targeting main (deploy is skipped)

jobs:

  # ── Job 1: Build, migrate, test ────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Required for pushing the Docker image to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    env:
      # Injected from secrets so the app can connect to the database during CI
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # Check out the repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx — enables layer caching and advanced build features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry using the auto-generated GITHUB_TOKEN.
      # No extra secret needed — GitHub provides this token automatically.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image ONCE on GitHub's fast runners and push to GHCR.
      # Layer caching means repeated builds only rebuild what changed — skipping
      # unchanged layers (node_modules, base image, etc.) makes this much faster.
      # EC2 will pull this pre-built image instead of building from scratch.
      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/redscall599/qrcode:latest
          # Cache layers to/from GHCR so subsequent CI runs only rebuild changes
          cache-from: type=registry,ref=ghcr.io/redscall599/qrcode:buildcache
          cache-to: type=registry,ref=ghcr.io/redscall599/qrcode:buildcache,mode=max

      # Switch back to the default Docker context so docker compose commands
      # can reach the host daemon (buildx-action creates its own context which
      # docker compose doesn't know about, causing "permission denied" errors).
      - name: Use default Docker context
        run: docker context use default

      # Pull the freshly built image so docker compose can start it for testing.
      # No --build flag needed — image was already built and pushed above.
      - name: Pull image for testing
        run: docker compose pull app

      # Start the app and database containers in the background
      - name: Start services
        run: docker compose up -d

      # Wait until Postgres is actually accepting connections before migrating.
      # Polls every 2 seconds for up to 60 seconds, then fails the job.
      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U qruser -d qrcode; then
              echo "Database is ready!"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 2
          done
          echo "Database did not become available in time."
          exit 1

      # Apply any pending Prisma migrations to the CI database
      # -T disables pseudo-TTY (required for non-interactive CI environments)
      # --config points explicitly to prisma.config.ts so Prisma finds it
      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy --config prisma.config.ts

      # Run the test suite — the job fails here if any tests fail,
      # which blocks the deploy job from running
      - name: Run tests
        run: docker compose exec -T app npm test

      # Always clean up containers and volumes, even if a previous step failed
      # -v removes volumes so the next run starts with a clean database
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Job 2: Deploy to EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test         # blocked until Job 1 passes
    # Only deploy when code is pushed/merged to main — not on PRs or develop
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # SSH into the EC2 server and run the deploy commands remotely
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          # Increase timeout to 30 minutes — docker pull + startup on small EC2 can be slow
          command_timeout: 30m
          script: |
            set -e   # stop immediately if any command fails

            # Install Docker if it is not already present on the server
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            # Clone the repo on first deploy if the folder doesn't exist yet
            if [ ! -d ${{ secrets.EC2_PROJECT_PATH }} ]; then
              git clone https://github.com/RedScall599/QRCODE.git ${{ secrets.EC2_PROJECT_PATH }}
            fi

            # Pull latest code from main (docker-compose.yml updates, .env changes, etc.)
            cd ${{ secrets.EC2_PROJECT_PATH }} && git pull origin main

            # Pull the pre-built image from GHCR.
            # EC2 downloads the finished image instead of rebuilding everything.
            # NOTE: make your GHCR package public:
            #       GitHub → Packages → qrcode → Package settings → Change visibility → Public
            docker pull ghcr.io/redscall599/qrcode:latest

            # Stop running containers (graceful shutdown before swapping the image)
            docker compose down

            # Run Prisma migrations as a one-shot container before starting the app.
            # This avoids races where exec runs before the app process is ready.
            docker compose run --rm --no-deps app \
              npx prisma migrate deploy --config prisma.config.ts

            # Start all containers with the newly pulled image in the background
            docker compose up -d

            # Wait until the app container is healthy (up to 60 seconds).
            # Exits as soon as the healthcheck passes so we don't waste time.
            echo "Waiting for app to become healthy..."
            timeout 60 sh -c \
              'until [ "$(docker inspect -f "{{.State.Health.Status}}" $(docker compose ps -q app))" = "healthy" ]; do
                sleep 3
              done' || echo "Health check timed out — container may still be starting"

            # Remove leftover dangling images to free disk space
            docker image prune -f

            # Remove leftover dangling images to free disk space
            docker image prune -f

