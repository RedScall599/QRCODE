# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — QR Code Generator
#
# JOBS:
#   build-and-test → runs on every push to main/develop and every PR to main
#                     - builds Docker containers
#                     - starts app + database
#                     - runs Prisma migrations
#                     - runs the test suite
#                     - tears everything down after
#
#   deploy         → runs ONLY when build-and-test passes on a push to main
#                     - SSHs into your EC2 server
#                     - clones the repo if it doesn't exist yet
#                     - pulls the latest code
#                     - rebuilds and restarts containers
#                     - runs any new Prisma migrations
#
# ─── REQUIRED GITHUB SECRETS ─────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   DATABASE_URL      Full Postgres connection string for the CI database
#   EC2_HOST          IP address of your EC2 instance  (e.g. 34.230.24.49)
#   EC2_USER          SSH username                      (e.g. ubuntu)
#   EC2_KEY           Full contents of your .pem file  (the private key text)
#   EC2_PROJECT_PATH  Absolute path to the project on the server
#                     (e.g. /home/ubuntu/QRCODE)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop]   # run on pushes to main OR develop
  pull_request:
    branches: [main]            # run on PRs targeting main (deploy is skipped)

jobs:

  # ── Job 1: Build, migrate, test ────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      # Injected from secrets so the app can connect to the database during CI
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # Check out the repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Build Docker images defined in docker-compose.yml
      # This catches any Dockerfile errors before trying to start services
      - name: Build containers
        run: docker compose build

      # Start the app and database containers in the background
      - name: Start services
        run: docker compose up -d

      # Give Postgres time to fully initialize before running migrations
      - name: Wait for database
        run: sleep 15

      # Apply any pending Prisma migrations to the CI database
      # -T disables pseudo-TTY (required for non-interactive CI environments)
      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy

      # Run the test suite — the job fails here if any tests fail,
      # which blocks the deploy job from running
      - name: Run tests
        run: docker compose exec -T app npm test

      # Always clean up containers and volumes, even if a previous step failed
      # -v removes volumes so the next run starts with a clean database
      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Job 2: Deploy to EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test         # blocked until Job 1 passes
    # Only deploy when code is pushed/merged to main — not on PRs or develop
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # SSH into the EC2 server and run the deploy commands remotely
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e   # stop immediately if any command fails

            # Clone the repo on first deploy if the folder doesn't exist yet
            if [ ! -d ${{ secrets.EC2_PROJECT_PATH }} ]; then
              git clone https://github.com/RedScall599/QRCODE.git ${{ secrets.EC2_PROJECT_PATH }}
            fi

            # Pull latest code from main
            cd ${{ secrets.EC2_PROJECT_PATH }} && git pull origin main

            # Stop running containers (graceful shutdown before rebuild)
            docker compose down

            # Rebuild images and start containers in the background
            docker compose up --build -d

            # Apply any new Prisma migrations that came in with the pull
            docker compose exec -T app npx prisma migrate deploy

            # Remove leftover dangling images to free disk space
            docker image prune -f

