# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — QR Code Generator
#
# JOBS:
#   build-and-test → runs on every push to main/develop and every PR to main
#                     - builds Docker containers
#                     - starts app + database
#                     - runs Prisma migrations
#                     - runs the test suite
#                     - tears everything down after
#
#   deploy         → runs ONLY when build-and-test passes on a push to main
#                     - SSHs into your EC2 server
#                     - clones the repo if it doesn't exist yet
#                     - pulls the latest code
#                     - rebuilds and restarts containers
#                     - runs any new Prisma migrations
#
# ─── REQUIRED GITHUB SECRETS ─────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   DATABASE_URL      Full Postgres connection string for the CI database
#   EC2_HOST          IP address of your EC2 instance  (e.g. 34.230.24.49)
#   EC2_USER          SSH username                      (e.g. ubuntu)
#   EC2_SSH_KEY           Full contents of your .pem file  (the private key text)
#   EC2_PROJECT_PATH  Absolute path to the project on the server
#                     (e.g. /home/ubuntu/QRCODE)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop]   # run on pushes to main OR develop
  pull_request:
    branches: [main]            # run on PRs targeting main (deploy is skipped)

jobs:

  # ── Job 1: Build, migrate, test ────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Required for pushing the Docker image to GitHub Container Registry
    permissions:
      contents: read
      packages: write

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # Check out the repository code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js so we can run Prisma and tests directly on the runner.
      # This avoids Docker networking issues when running migrations.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install all dependencies (needed for prisma generate + running tests)
      - name: Install dependencies
        run: npm ci

      # Generate the Prisma client from schema before running anything
      - name: Generate Prisma client
        run: npx prisma generate

      # Run migrations directly on the runner against your Neon database.
      # No Docker networking involved — connects straight to Neon via DATABASE_URL secret.
      - name: Run migrations
        run: npx prisma migrate deploy

      # Run the smoke test directly on the runner — no Docker needed
      - name: Run tests
        run: npm test

      # Set up Docker Buildx for building and pushing the image to GHCR
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry using the auto-generated GITHUB_TOKEN.
      # No extra secret needed — GitHub provides this token automatically.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the image ONCE on GitHub's fast runners and push to GHCR.
      # EC2 will pull this pre-built image instead of building from scratch.
      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/redscall599/qrcode:latest
          # Cache layers so subsequent CI runs only rebuild what changed
          cache-from: type=registry,ref=ghcr.io/redscall599/qrcode:buildcache
          cache-to: type=registry,ref=ghcr.io/redscall599/qrcode:buildcache,mode=max

  # ── Job 2: Deploy to EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test         # blocked until Job 1 passes
    # Only deploy when code is pushed/merged to main — not on PRs or develop
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # SSH into the EC2 server and run the deploy commands remotely
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          # Increase timeout to 30 minutes — docker pull + startup on small EC2 can be slow
          command_timeout: 30m
          script: |
            set -e   # stop immediately if any command fails

            # Install Docker if it is not already present on the server
            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker "$USER"
              echo "Docker installed. Re-run the pipeline — group membership needs a new session."
              exit 1
            fi

            PROJECT_PATH="${{ secrets.EC2_PROJECT_PATH }}"

            # Clone the repo on first deploy if the folder doesn't exist yet
            if [ ! -d "$PROJECT_PATH" ]; then
              git clone https://github.com/RedScall599/QRCODE.git "$PROJECT_PATH"
            fi

            # Pull latest code from main (docker-compose.yml, .env changes, etc.)
            cd "$PROJECT_PATH" && git pull origin main

            # Pull the pre-built image from GHCR instead of rebuilding on EC2
            docker pull ghcr.io/redscall599/qrcode:latest

            # Stop running containers before swapping the image
            docker compose down

            # Run migrations using the .env file on EC2 (must have Neon DATABASE_URL)
            docker run --rm \
              --env-file "$PROJECT_PATH/.env" \
              ghcr.io/redscall599/qrcode:latest \
              npx prisma migrate deploy

            # Start all containers with the newly pulled image
            docker compose up -d

            # Remove leftover dangling images to free disk space
            docker image prune -f

