# ─────────────────────────────────────────────────────────────────────────────
# Add these in: GitHub repo → Settings → Secrets and variables → Actions
#
#   DATABASE_URL        Full Postgres connection string for the Neon (Remote) DB
#   OPENAI_API_KEY      Your OpenAI API key (for AI chat in the app)
#   EC2_HOST            IP address of your EC2 instance
#   EC2_USER            SSH username
#   EC2_SSH_KEY         Full contents of your .pem file (private key)
#   EC2_PROJECT_PATH    Absolute path to the project on the server
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}    # <-- Add OpenAI secret here for test/CI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/redscall599/qrcode:latest
          cache-from: type=registry,ref=ghcr.io/redscall599/qrcode:buildcache
          cache-to: type=registry,ref=ghcr.io/redscall599/qrcode:buildcache,mode=max

      - name: Pull image for testing
        run: docker compose pull app

      # Create a test .env for the app in CI (optional, if your app expects it even in CI env)
      - name: Write .env for CI (optional, if needed)
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Start services
        run: docker compose up -d

      - name: Wait for database
        run: sleep 15

      - name: Run migrations
        run: docker compose exec -T app npx prisma migrate deploy --config prisma.config.ts

      - name: Run tests
        run: docker compose exec -T app npm test

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 30m
          script: |
            set -e

            if ! command -v docker &> /dev/null; then
              echo "Docker not found — installing..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            fi

            if [ ! -d ${{ secrets.EC2_PROJECT_PATH }} ]; then
              git clone https://github.com/RedScall599/QRCODE.git ${{ secrets.EC2_PROJECT_PATH }}
            fi

            cd ${{ secrets.EC2_PROJECT_PATH }} && git pull origin main

            docker pull ghcr.io/redscall599/qrcode:latest

            docker compose down

            # --- INJECT ENV SECRETS FOR EC2 DOCKER APP ---
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
            # Add other env vars similarly if needed

            docker compose run --rm --no-deps app \
              npx prisma migrate deploy --config prisma.config.ts

            docker compose up -d

            echo "Waiting for app to become healthy..."
            timeout 60 sh -c \
              'until [ "$(docker inspect -f "{{.State.Health.Status}}" $(docker compose ps -q app))" = "healthy" ]; do
                sleep 3
              done' || echo "Health check timed out — container may still be starting"

            docker image prune -f
            docker image prune -f