# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — QR Code Generator (PRODUCTION/EC2/NEON VERSION)
#
# For EC2 deployment with Neon as the database:
#   1. No db service is defined here; app connects directly to Neon via DATABASE_URL.
#   2. Inject your Neon connection string during deploy (written to .env by your deploy script).
#
# For local dev, you may keep a separate compose file that includes the db service.
#
# Required: .env file at deploy time with:
#   DATABASE_URL=postgresql://QR_CODE_ROLE:password@ep-holy-violet-adawc2de.c-2.us-east-1.aws.neon.tech/QR_CODE_DB?sslmode=require&channel_binding=require
#   OPENAI_API_KEY=sk-...
# ─────────────────────────────────────────────────────────────────────────────

services:
  app:
    image: ghcr.io/redscall599/qrcode:latest
    restart: unless-stopped
    ports:
      - "3000:3000"

    # Reads env vars from the .env file (written by your deploy script from GitHub secrets)
    env_file:
      - .env

    environment:
      # These are fallback/defaults and can be omitted if always using .env
      # DATABASE_URL: ${DATABASE_URL}
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Add other env vars you might need as needed

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

    volumes:
      - uploads_data:/app/public/uploads

volumes:
  uploads_data:
